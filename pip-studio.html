<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Pip Character Studio</title>
<style>
:root{
  --bg:#fbf7f2;--surface:#fff;--ink:#3a342e;--muted:#7d736a;--border:#e4d7c7;
  --accent:#805226;--skin:#c98652;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{padding:24px 20px 14px;max-width:1100px;margin:auto}
h1,h2{font-family:Georgia,serif}
h1{margin:0 0 6px}
main{max-width:1100px;margin:auto;padding:0 20px 40px;display:grid;grid-template-columns:minmax(280px,420px) 1fr;gap:24px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:0 12px 30px rgba(55,36,16,.08)}
.controls{display:grid;gap:16px}
.control-group h2{font-size:1.05rem;margin:0 0 10px}
.button-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:8px}
button{min-height:46px;border-radius:13px;border:2px solid #d6c0a0;background:#fffaf0;color:var(--ink);font-weight:750;padding:8px 10px}
button[aria-pressed="true"]{border-color:var(--accent);background:#f1dfc5;box-shadow:inset 0 0 0 1px var(--accent)}
.tone-row{display:flex;gap:10px;flex-wrap:wrap}
.tone{width:46px;height:46px;border-radius:50%;padding:0;border:3px solid #fff;box-shadow:0 0 0 2px #bda37d}
.tone[aria-pressed="true"]{box-shadow:0 0 0 4px var(--accent)}
.stage{min-height:620px;display:grid;place-items:center;position:relative;overflow:hidden}
.caption{position:absolute;left:18px;right:18px;bottom:18px;background:#fffdf9;border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center}
.pip{
  --pip-skin:var(--skin);
  position:relative;width:270px;height:330px;filter:drop-shadow(0 20px 22px rgba(45,27,12,.22));
  transition:transform .25s ease;
}
.body{
  position:absolute;left:25px;top:55px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle at 34% 28%,rgba(255,255,255,.48),transparent 20%),
  linear-gradient(145deg,var(--pip-skin),color-mix(in srgb,var(--pip-skin) 72%,#6e3f22));
  border:12px solid rgba(86,48,25,.72);box-shadow:inset 0 -14px 24px rgba(71,34,16,.22),inset 0 9px 16px rgba(255,255,255,.3)
}
.inner{position:absolute;inset:22px;border-radius:50%;border:6px solid rgba(74,39,20,.28)}
.cap{position:absolute;left:72px;top:12px;width:126px;height:66px;border-radius:58px 58px 16px 16px;background:#2f7454;border:8px solid #22543d;transform:rotate(-6deg);z-index:3}
.cap::after{content:"P";position:absolute;left:46px;top:5px;color:#fff;font:900 38px Georgia,serif}
.cap::before{content:"";position:absolute;right:-45px;bottom:-5px;width:62px;height:18px;border-radius:14px;background:inherit;border:7px solid inherit}
.pip[data-style="girl"] .cap{background:#8c4d7f;border-color:#67365d}
.eye{position:absolute;top:87px;width:28px;height:39px;border-radius:50%;background:#1d1814}
.eye::after{content:"";position:absolute;left:6px;top:6px;width:8px;height:10px;border-radius:50%;background:#fff}
.eye.left{left:71px}.eye.right{right:71px}
.brow{position:absolute;top:71px;width:38px;height:10px;border-radius:50%;border-top:7px solid #3a2418}
.brow.left{left:60px}.brow.right{right:60px}
.mouth{position:absolute;left:79px;top:139px;width:58px;height:34px;border-bottom:9px solid #4c2118;border-radius:0 0 50px 50px}
.cheek{position:absolute;top:135px;width:25px;height:15px;border-radius:50%;background:rgba(180,64,78,.34)}
.cheek.left{left:42px}.cheek.right{right:42px}
.arm,.leg,.shoe,.prop{position:absolute}
.arm{top:180px;width:78px;height:22px;border-radius:18px;background:var(--pip-skin);border:7px solid rgba(86,48,25,.65)}
.arm.left{left:-26px;transform:rotate(28deg)}.arm.right{right:-26px;transform:rotate(-28deg)}
.hand{position:absolute;top:208px;width:34px;height:34px;border-radius:50%;background:var(--pip-skin);border:7px solid rgba(86,48,25,.65)}
.hand.left{left:-38px}.hand.right{right:-38px}
.leg{top:266px;width:24px;height:50px;border-radius:12px;background:#62422f}
.leg.left{left:84px}.leg.right{right:84px}
.shoe{top:306px;width:62px;height:25px;border-radius:50%;background:#ece8df;border:7px solid #49372a}
.shoe.left{left:50px}.shoe.right{right:50px}
.prop{display:none;z-index:5;font-size:72px;line-height:1}
.pip[data-pose="holding-dice"] .prop.dice,
.pip[data-pose="holding-cube"] .prop.cube,
.pip[data-pose="magnifying"] .prop.mag{display:block;right:-18px;top:170px}
.pip[data-pose="thumbs-up"] .prop.thumb{display:block;right:-10px;top:145px}
.pip[data-pose="pointing"] .arm.right{transform:rotate(-4deg);right:-42px}
.pip[data-pose="looking-board"]{transform:rotate(4deg)}
.pip[data-pose="peeking"]{transform:translateX(115px)}
/* Expressions */
.pip[data-expression="happy"] .mouth,
.pip[data-expression="proud"] .mouth,
.pip[data-expression="celebrating"] .mouth{height:42px;border-bottom-width:10px}
.pip[data-expression="thinking"] .brow.left{transform:rotate(12deg)}
.pip[data-expression="thinking"] .brow.right{transform:rotate(-12deg)}
.pip[data-expression="curious"] .brow.left{transform:translateY(-8px) rotate(-10deg)}
.pip[data-expression="excited"] .eye{height:45px}
.pip[data-expression="aha"] .brow{transform:translateY(-9px)}
.pip[data-expression="concerned"] .brow.left{transform:rotate(20deg)}
.pip[data-expression="concerned"] .brow.right{transform:rotate(-20deg)}
.pip[data-expression="concerned"] .mouth,
.pip[data-expression="oops"] .mouth{border-bottom:0;border-top:8px solid #4c2118;border-radius:50% 50% 0 0;top:158px}
.pip[data-expression="confused"] .brow.left{transform:translateY(-9px) rotate(-18deg)}
.pip[data-expression="confused"] .brow.right{transform:translateY(7px) rotate(18deg)}
.pip[data-expression="winking"] .eye.left{height:7px;top:103px;border-radius:10px}
.pip[data-expression="winking"] .eye.left::after{display:none}
.pip[data-expression="celebrating"]{animation:bounce .75s ease-in-out infinite alternate}
@keyframes bounce{to{transform:translateY(-20px) rotate(3deg)}}
@media(max-width:800px){main{grid-template-columns:1fr}.stage{min-height:520px}.pip{transform:scale(.82)}.pip[data-pose="peeking"]{transform:scale(.82) translateX(110px)}}
@media(prefers-reduced-motion:reduce){.pip{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<header>
<p><a href="index.html" style="color:#805226;font-weight:800;text-decoration:none">← Back to Backgammon Coach</a></p>
<h1>Pip Character Studio</h1>
<p>Preview the first reusable expression and pose system for Pip.</p>
</header>
<main>
<section class="panel controls">
  <div class="control-group"><h2>Pip style</h2><div class="button-grid">
    <button data-style="boy" aria-pressed="true">Boy Pip</button>
    <button data-style="girl" aria-pressed="false">Girl Pip</button>
  </div></div>
  <div class="control-group"><h2>Skin tone</h2><div class="tone-row">
    <button class="tone" data-tone="#f4cfb2" style="background:#f4cfb2" aria-label="Light" aria-pressed="false"></button>
    <button class="tone" data-tone="#e5ad82" style="background:#e5ad82" aria-label="Light medium" aria-pressed="false"></button>
    <button class="tone" data-tone="#c98652" style="background:#c98652" aria-label="Medium" aria-pressed="true"></button>
    <button class="tone" data-tone="#a8643d" style="background:#a8643d" aria-label="Medium deep" aria-pressed="false"></button>
    <button class="tone" data-tone="#75452f" style="background:#75452f" aria-label="Deep" aria-pressed="false"></button>
    <button class="tone" data-tone="#4a2b21" style="background:#4a2b21" aria-label="Very deep" aria-pressed="false"></button>
  </div></div>
  <div class="control-group"><h2>Expression</h2><div class="button-grid" id="expressions"></div></div>
  <div class="control-group"><h2>Pose</h2><div class="button-grid" id="poses"></div></div>
</section>
<section class="panel stage">
  <div id="pip" class="pip" data-style="boy" data-expression="neutral" data-pose="standing" role="img" aria-label="Boy Pip with medium skin tone, neutral expression, standing pose">
    <div class="cap"></div>
    <div class="body"><div class="inner"></div><div class="brow left"></div><div class="brow right"></div><div class="eye left"></div><div class="eye right"></div><div class="cheek left"></div><div class="cheek right"></div><div class="mouth"></div></div>
    <div class="arm left"></div><div class="arm right"></div><div class="hand left"></div><div class="hand right"></div>
    <div class="leg left"></div><div class="leg right"></div><div class="shoe left"></div><div class="shoe right"></div>
    <div class="prop dice">🎲</div><div class="prop cube">◼️</div><div class="prop mag">🔍</div><div class="prop thumb">👍</div>
  </div>
  <div id="caption" class="caption">Neutral + Standing</div>
</section>
</main>
<script>
const expressions=['neutral','happy','thinking','curious','excited','proud','aha','concerned','oops','confused','winking','celebrating'];
const poses=['standing','pointing','looking-board','holding-dice','holding-cube','magnifying','thumbs-up','peeking'];
const labels=s=>s.split('-').map(x=>x.charAt(0).toUpperCase()+x.slice(1)).join(' ');
const pip=document.getElementById('pip'), caption=document.getElementById('caption');
let state={style:'boy',tone:'#c98652',toneName:'Medium',expression:'neutral',pose:'standing'};
function build(group,values,key){
  const el=document.getElementById(group);
  values.forEach((value,i)=>{
    const b=document.createElement('button');b.textContent=labels(value);b.dataset[key]=value;b.setAttribute('aria-pressed',String(i===0));
    b.onclick=()=>{state[key]=value;document.querySelectorAll(`[data-${key}]`).forEach(x=>x.setAttribute('aria-pressed',String(x===b)));render()};
    el.appendChild(b);
  });
}
build('expressions',expressions,'expression');build('poses',poses,'pose');
document.querySelectorAll('[data-style]').forEach(b=>b.onclick=()=>{state.style=b.dataset.style;document.querySelectorAll('[data-style]').forEach(x=>x.setAttribute('aria-pressed',String(x===b)));render()});
document.querySelectorAll('[data-tone]').forEach(b=>b.onclick=()=>{state.tone=b.dataset.tone;state.toneName=b.getAttribute('aria-label');document.querySelectorAll('[data-tone]').forEach(x=>x.setAttribute('aria-pressed',String(x===b)));render()});
function render(){
  pip.dataset.style=state.style;pip.dataset.expression=state.expression;pip.dataset.pose=state.pose;pip.style.setProperty('--pip-skin',state.tone);
  const text=`${labels(state.style)} Pip with ${state.toneName.toLowerCase()} skin tone, ${labels(state.expression).toLowerCase()} expression, ${labels(state.pose).toLowerCase()} pose`;
  pip.setAttribute('aria-label',text);caption.textContent=`${labels(state.expression)} + ${labels(state.pose)}`;
}
render();
</script>
</body>
</html>
